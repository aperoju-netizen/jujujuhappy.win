<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Journey Yields Crescent ｜ JYC🌙</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: #060a13 url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=90&w=1920&auto=format&fit=crop') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 极简高级名片卡片容器 */
        .jike-card {
            background: #ffffff;
            width: 90%;
            max-width: 460px;
            border-radius: 28px;
            padding: 45px 35px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInCard 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 顶部干净的艺术标栏 */
        .card-brand {
            display: flex;
            align-items: center;
            color: #1e293b;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        /* 圆形人画像素级居中容器 */
        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            background: #f1f5f9;
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 30%; 
        }

        /* 主标题 */
        .user-name {
            font-size: 1.55rem;
            color: #0f172a;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        /* 核心精神诗篇区 */
        .poem-section {
            width: 100%;
            margin-bottom: 25px;
            padding: 0 10px;
        }
        .poem-line {
            color: #475569;
            font-size: 0.95rem;
            letter-spacing: 2px;
            line-height: 2;
            font-weight: 400;
        }
        .poem-highlight {
            color: #0f172a;
            font-weight: 600;
            margin: 4px 0;
        }

        /* 独立态度宣言卡片 */
        .bio-statement {
            background: #f8fafc;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.9rem;
            color: #334155;
            line-height: 1.6;
            width: 100%;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1px;
            border: 1px solid #f1f5f9;
        }

        /* 全显邮箱按钮 */
        .email-action {
            width: 100%;
        }
        .email-btn {
            display: block;
            width: 100%;
            background: #0f172a;
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }
        .email-btn:hover {
            background: #1e293b;
            transform: translateY(-1.5px);
            box-shadow: 0 6px 20px rgba(15, 23, 42, 0.15);
        }

        /* 右下角极简小飘带 */
        .ribbon {
            position: absolute;
            bottom: -8px;
            right: 12px;
            background: #f1f5f9;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .ribbon a {
            display: block;
            color: #64748b;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 12px;
            letter-spacing: 1px;
            text-decoration: none;
        }
        .ribbon:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        /* 优雅淡入动画 */
        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 400px) {
            .jike-card { padding: 35px 20px; }
            .user-name { font-size: 1.4rem; }
            .poem-line { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="jike-card">
        
        <!-- 顶部艺术标识 -->
        <div class="card-brand">
            JOURNEY YIELDS CRESCENT
        </div>

        <!-- 滇池路跃起头像 -->
        <div class="avatar-container">
            <img src="Fnqdtt6km546NUq9wbCbLeLaYplMv3.jpg" alt="JYC">
        </div>

        <!-- 核心品牌名 -->
        <h2 class="user-name">Journey Yields Crescent ｜ JYC🌙</h2>

        <!-- 精神诗篇叙事区 -->
        <div class="poem-section">
            <p class="poem-line">走过漫长独行的路途</p>
            <p class="poem-line">所有沉淀与奔赴</p>
            <p class="poem-line poem-highlight">终会迎来属于自己的弯月星光🌙 ✨</p>
            <p class="poem-line" style="color: #94a3b8; font-size: 0.85rem; margin-top: 6px;">“ 慢慢来，一切皆有回甘 ”</p>
        </div>

        <!-- 私人领地态度空间 -->
        <div class="bio-statement">
            清醒自持，温柔且有锋芒。
        </div>

        <!-- 联系方式 -->
        <div class="email-action">
            <a href="mailto:apero.ju@gmail.com" class="email-btn">✉️ apero.ju@gmail.com</a>
        </div>

        <!-- 极简页脚标（已成功调整为根域名超链接） -->
        <div class="ribbon">
            <a href="http://jujujuhappy.win">jujujuhappy.win</a>
        </div>

    </div>

</body>
</html>
