<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>私人领地～✨想发什么就发什么✨想什么时候发就什么时候发</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            /* 🎨 即刻网页端标志性的极简浅灰蓝背景 */
            background: #f4f6f9;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* ================= 🎆 纯 CSS 烟花引擎 ================= */
        .fireworks-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            opacity: 0;
            animation: fireworkBurst 5s cubic-bezier(0.1, 0.8, 0.1, 1) infinite;
        }
        .firework:nth-child(1) { top: 25%; left: 20%; background: #FFE411; animation-delay: 0s; color: #FFE411; }
        .firework:nth-child(2) { top: 20%; left: 80%; background: #1890ff; animation-delay: 2s; color: #1890ff; }

        @keyframes fireworkBurst {
            0% { transform: translate3d(0, 40vh, 0) scale(1); opacity: 1; box-shadow: 0 0 0px rgba(255,255,255,0); }
            30% { transform: translate3d(0, 0, 0) scale(1); opacity: 1; box-shadow: -60px -60px 0 currentColor, 80px -60px 0 currentColor, -60px 80px 0 currentColor, 80px 80px 0 currentColor, 0px -80px 0 currentColor, 0px 80px 0 currentColor; }
            100% { transform: translate3d(0, 30px, 0) scale(0.2); opacity: 0; box-shadow: -120px -120px 8px rgba(255,255,255,0), 120px -120px 8px rgba(255,255,255,0); }
        }

        /* ================= 💛 左侧即刻官方固定导航栏 ================= */
        .jike-sidebar {
            width: 68px;
            height: 100%;
            background: #ffffff;
            border-right: 1px solid #e6ebf4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            justify-content: space-between;
            z-index: 100;
            flex-shrink: 0;
        }
        .sidebar-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            width: 100%;
        }
        .jike-logo {
            width: 32px;
            height: 32px;
            background: #FFE411;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000000;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(255, 228, 17, 0.3);
        }
        .nav-item {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .nav-item:hover, .nav-item.active {
            color: #111827;
            background: #f4f6f9;
        }
        .nav-item.add-btn {
            background: #FFE411;
            color: #000000;
            box-shadow: 0 4px 12px rgba(255, 228, 17, 0.4);
        }
        .nav-item.add-btn:hover { background: #f5da00; transform: scale(1.05); }
        .sidebar-icon { width: 22px; height: 22px; fill: currentColor; }

        /* ================= 🎵 右上角全景悬浮黑胶音乐控制器 ================= */
        .music-player-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
        }
        .music-toggle-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #ffffff;
            border: 1px solid #e6ebf4;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(7, 14, 26, 0.05);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .music-toggle-btn:hover { transform: scale(1.06); background: #fafafa; }
        .music-icon { width: 18px; height: 18px; fill: #475569; }
        .music-playing {
            border-color: #FFE411;
            box-shadow: 0 0 14px rgba(255, 228, 17, 0.45);
        }
        .music-playing .music-icon { fill: #000000; animation: recordRotate 4s linear infinite; }
        @keyframes recordRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ================= 📱 绝对加固：大页面中央内容容器 ================= */
        .main-content {
            flex: 1;
            width: calc(100% - 68px);
            height: 100%;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            overflow-y: auto;
            padding: 40px 24px;
            z-index: 10;
        }

        /* 🏢 即刻风主页黄金大卡片 */
        .jike-main-card {
            background: #ffffff;
            width: 100%;
            max-width: 600px; /* 锁定即刻最佳视效宽度 */
            border-radius: 24px;
            border: 1px solid #e6ebf4;
            box-shadow: 0 12px 40px rgba(7, 14, 26, 0.04);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            /* 🛠️ 双保险核心修复：利用自动外边距强行霸占剩余空间，100%上下左右居中 */
            margin: auto !important; 
            animation: jikeCardFadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 顶部 Banner 区 */
        .card-banner {
            width: 100%;
            height: 160px;
            background: #060a13 url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=90&w=800&auto=format&fit=crop') no-repeat center center/cover;
        }

        /* 个人信息主区块 */
        .profile-header-block {
            padding: 0 28px 24px 28px;
            text-align: left;
            position: relative;
            border-bottom: 1px solid #f4f6f9;
        }

        /* 头像打破边界重叠 */
        .jike-avatar-wrapper {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
            overflow: hidden;
            margin-top: -48px;
            background: #f1f5f9;
            margin-bottom: 14px;
        }
        .jike-avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }

        .header-action-btn {
            position: absolute;
            top: 16px;
            right: 28px;
            padding: 6px 20px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #475569;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .header-action-btn:hover { background: #f8fafc; color: #111827; }

        .jike-name {
            font-size: 1.45rem;
            color: #111827;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 即刻徽章小标签 */
        .jike-tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .jike-tag {
            font-size: 0.78rem;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 600;
        }
        .tag-geo { background: #fdf2f8; color: #db2777; }
        .tag-work { background: #eff6ff; color: #2563eb; }
        .tag-star { background: #fef3c7; color: #d97706; }

        /* Tab栏 */
        .jike-tabs {
            display: flex;
            gap: 28px;
            padding: 0 28px;
            border-bottom: 1px solid #f4f6f9;
            background: #ffffff;
        }
        .jike-tab {
            padding: 14px 0;
            font-size: 0.92rem;
            color: #475569;
            font-weight: 700;
            cursor: pointer;
            position: relative;
        }
        .jike-tab.active { color: #111827; }
        .jike-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #FFE411;
            border-radius: 20px;
        }

        /* ================= 📝 即刻动态流区域 ================= */
        .jike-feed-list { background: #ffffff; display: flex; flex-direction: column; }
        .feed-item { padding: 24px; display: flex; gap: 14px; text-align: left; }
        .feed-avatar { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
        .feed-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .feed-main { flex: 1; }
        .feed-user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .feed-user-name { font-weight: 700; color: #111827; font-size: 0.95rem; }
        .feed-pin { font-size: 0.75rem; color: #ef4444; font-weight: 700; display: flex; align-items: center; gap: 2px; }
        .feed-time { font-size: 0.78rem; color: #94a3b8; margin-bottom: 10px; }

        .feed-content { color: #111827; font-size: 0.96rem; line-height: 1.65; margin-bottom: 16px; }
        .poem-box { margin-top: 12px; padding-left: 12px; border-left: 3px solid #FFE411; color: #4b5563; }
        .poem-box p { margin-bottom: 4px; }

        /* 联络工具方块矩阵 */
        .feed-buttons-matrix { display: flex; gap: 10px; margin-bottom: 16px; width: 100%; }
        .matrix-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #334155;
            padding: 11px 0;
            border-radius: 12px;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .matrix-btn:hover { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }

        /* 即刻标配互动栏 */
        .feed-interact-bar { display: flex; justify-content: space-between; max-width: 380px; color: #86909c; font-size: 0.82rem; margin-top: 14px; }
        .interact-item { display: flex; align-items: center; gap: 6px; cursor: pointer; transition: color 0.2s; }
        .interact-item:hover { color: #111827; }
        .interact-icon { width: 16px; height: 16px; fill: currentColor; }

        /* 右下角固定勋章 */
        .whats-new-badge {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #ffffff;
            border: 1px solid #e6ebf4;
            padding: 7px 16px;
            border-radius: 30px;
            font-size: 0.78rem;
            font-weight: 700;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 16px rgba(7, 14, 26, 0.04);
            text-decoration: none;
            z-index: 100;
        }
        .whats-new-dot { width: 6px; height: 6px; background: #1890ff; border-radius: 50%; }

        @keyframes jikeCardFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .jike-sidebar { display: none; }
            .main-content { padding: 16px 12px; width: 100%; }
            .jike-main-card { border-radius: 16px; }
            .feed-buttons-matrix { flex-direction: column; gap: 8px; }
            .matrix-btn { width: 100%; }
            .music-player-container { top: 16px; right: 16px; }
        }
    </style>
</head>
<body>

        <div class="nav-item">
